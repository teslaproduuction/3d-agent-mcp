# Полный стек: приложение + все AI сервисы в Docker
# Запуск: docker-compose up -d
# Интерфейс: http://localhost

services:

  # ── Nginx reverse proxy (внешняя точка входа) ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: 3d-agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/acme-webroot:/var/www/acme-challenge:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - 3d-agent-net

  # ── Gradio App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3d-agent-app
    expose:
      - "7860"
    environment:
      - PYTHONUNBUFFERED=1
      - U2NET_HOME=/app/cache/u2net
      # Переопределение URL сервисов на имена Docker-сети
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - COMFYUI_URL=http://flux:8188
      - HUNYUAN3D_URL=http://hunyuan3d:8081
      - REDIS_URL=redis://redis:6379
      - REDIS_SESSION_TTL_SECONDS=86400
      # Heatmap compare load-shedding (stability / OOM protection)
      - HEATMAP_ENABLED=1
      - HEATMAP_SAMPLE_POINTS=8000
      - HEATMAP_CHUNK_SIZE=12000
      # Gradio queue limits for heavy CPU tasks
      - GRADIO_ENABLE_QUEUE=1
      - GRADIO_QUEUE_CONCURRENCY=1
      - GRADIO_QUEUE_MAX_SIZE=32
      # API ключи (опционально, нужны только при использовании облачных провайдеров)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TRIPO_API_KEY=${TRIPO_API_KEY:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
    volumes:
      # Hot-reload кода без пересборки образа
      - ./agents:/app/agents
      - ./api_clients:/app/api_clients
      - ./ui:/app/ui
      - ./utils:/app/utils
      - ./config.yaml:/app/config.yaml
      # Общие выходные директории
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - app-cache:/app/cache
    depends_on:
      ollama:
        condition: service_healthy
      flux:
        condition: service_healthy
      hunyuan3d:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 6g
    mem_reservation: 2g
    networks:
      - 3d-agent-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── LLM — Ollama ───────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: 3d-agent-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=5m
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - 3d-agent-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  # One-shot: скачивает qwen2.5:7b если ещё нет
  ollama-init:
    image: ollama/ollama:latest
    container_name: 3d-agent-ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c",
      "ollama list | grep -q 'qwen2.5:7b' && echo 'Already present' || (ollama pull qwen2.5:7b && echo 'Done')"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - 3d-agent-net
    restart: "no"

  # ── Image generation — FLUX.1-schnell via ComfyUI ─────────────────────────
  flux:
    build:
      context: ./docker/comfyui
      dockerfile: Dockerfile
    image: 3dagentmcp-comfyui:latest
    container_name: 3d-agent-flux
    ports:
      - "9188:8188"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - MODELS_DOWNLOAD=schnell
      - LOW_VRAM=true
      - CLI_ARGS=--listen 0.0.0.0 --lowvram
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./docker/comfyui/manager-config.ini:/app/ComfyUI/user/__manager/config.ini:ro
      - flux-data:/app
      - ./outputs/flux:/app/output
    tmpfs:
      - /tmp:size=512m,mode=1777
    restart: unless-stopped
    networks:
      - 3d-agent-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8188/system_stats > /dev/null 2>&1 || python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats')\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ── 3D generation — Hunyuan3D-2mini ────────────────────────────────────────
  hunyuan3d:
    build:
      context: ./docker/hunyuan3d
      dockerfile: Dockerfile
    container_name: 3d-agent-hunyuan3d
    ports:
      - "8000:8081"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_PATH=tencent/Hunyuan3D-2mini
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/app/cache
      - TRANSFORMERS_CACHE=/app/cache
      - U2NET_HOME=/app/cache/u2net
      - HF_HUB_DISABLE_XET=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hunyuan3d-cache:/app/cache
      - ./outputs/hunyuan3d:/app/outputs
    restart: unless-stopped
    networks:
      - 3d-agent-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── 3D generation — Hunyuan3D-2mv (multiview input) ───────────────────────
  hunyuan3d-mv:
    build:
      context: ./docker/hunyuan3d
      dockerfile: Dockerfile
    image: 3dagentmcp-hunyuan3d:latest
    container_name: 3d-agent-hunyuan3d-mv
    ports:
      - "8001:8081"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_PATH=tencent/Hunyuan3D-2mv
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/app/cache
      - TRANSFORMERS_CACHE=/app/cache
      - U2NET_HOME=/app/cache/u2net
      - HF_HUB_DISABLE_XET=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hunyuan3d-cache:/app/cache
      - ./outputs/hunyuan3d:/app/outputs
    restart: unless-stopped
    networks:
      - 3d-agent-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ── Admin webhook (remote restart) ───────────────────────────────────────
  admin:
    build:
      context: ./docker/admin
      dockerfile: Dockerfile
    container_name: 3d-agent-admin
    ports:
      - "9001:9001"
    environment:
      - RESTART_TOKEN=${RESTART_TOKEN:?RESTART_TOKEN must be set}
      - APP_CONTAINER=3d-agent-app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - 3d-agent-net

  # ── Session state — Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: 3d-agent-redis
    # Порт не пробрасывается на хост — приложение подключается по имени сервиса внутри сети.
    # Раскомментируй если нужен доступ с хоста (redis-cli, etc.):
    # ports:
    #   - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - 3d-agent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  3d-agent-net:
    driver: bridge

volumes:
  app-cache:
  ollama-data:
  flux-data:
  hunyuan3d-cache:
  redis-data:
