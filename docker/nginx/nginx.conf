worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Resolve Docker service names dynamically.
    # This prevents stale upstream IPs after container recreation.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── HTTP — port 80 (keep alive + ACME challenge) ───────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME webroot challenge (Let's Encrypt / acme.sh)
        location /.well-known/acme-challenge/ {
            root /var/www/acme-challenge;
            try_files $uri =404;
        }

        # Allow larger uploads if users pass bigger images through the UI.
        client_max_body_size 100m;

        location /admin/ {
            proxy_pass http://admin:9001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # YSTU UI is served by a separate Gradio instance on port 7861.
        location = /ystu {
            return 301 /ystu/;
        }

        location /ystu/ {
            # Keep URI as-is (/ystu/...) so Gradio static/module assets resolve correctly.
            proxy_pass http://app:7861;
            proxy_http_version 1.1;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 10s;

            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;

            proxy_buffering off;
        }

        location / {
            set $app_upstream app:7860;
            proxy_pass http://$app_upstream;
            proxy_http_version 1.1;

            # Avoid stale frontend bundles after hot-reloads/restarts.
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Use proto from upstream proxy (e.g. ngrok terminates HTTPS and forwards as HTTP)
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            # Gradio uses websocket/streaming endpoints that require upgrade headers.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 10s;

            # During app restarts, retry transient upstream connection errors.
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;

            proxy_buffering off;
        }
    }

    # ── HTTPS — port 443 (active after cert is issued by acme.sh) ─────────────
    server {
        listen 443 ssl;
        server_name 3d-agent.abobateam.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 100m;

        location /admin/ {
            proxy_pass http://admin:9001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # YSTU UI is served by a separate Gradio instance on port 7861.
        location = /ystu {
            return 301 /ystu/;
        }

        location /ystu/ {
            # Keep URI as-is (/ystu/...) so Gradio static/module assets resolve correctly.
            proxy_pass http://app:7861;
            proxy_http_version 1.1;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 10s;

            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;

            proxy_buffering off;
        }

        location / {
            set $app_upstream app:7860;
            proxy_pass http://$app_upstream;
            proxy_http_version 1.1;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 10s;

            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;

            proxy_buffering off;
        }
    }
}
