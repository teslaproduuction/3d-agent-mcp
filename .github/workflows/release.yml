name: Create Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ```yaml
            # docker-compose.yml — replace image tag
            services:
              app:
                image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            See [README](https://github.com/${{ github.repository }}#quick-start) for full setup.
